<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShotAnalyst - Präzisions-Ballistik-Analysator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        canvas { image-rendering: auto; }
        .no-select { user-select: none; }
        
        /* Fadenkreuz-Cursor für den Analysebereich */
        #overlayCanvas { cursor: crosshair; }

        .panel-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .panel-scroll::-webkit-scrollbar-track {
            background: #09090b;
        }
        .panel-scroll::-webkit-scrollbar-thumb {
            background: #3f3f46;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen max-h-screen flex items-center justify-center font-sans no-select overflow-hidden p-2 md:p-4">

    <!-- Haupt-Gehäuse (Optimiert für Full-HD 1080p) -->
    <div class="w-full h-full max-w-[1900px] max-h-[96vh] bg-zinc-900 border border-zinc-800 rounded-xl shadow-2xl flex flex-col overflow-hidden">
        
        <!-- Kopfzeile -->
        <header class="p-4 border-b border-zinc-800 bg-zinc-950 flex justify-between items-center shrink-0">
            <div class="flex items-center gap-4">
                <h1 class="text-xl font-bold tracking-tight text-red-500 uppercase">ShotAnalyst <span class="text-xs text-zinc-500 font-normal ml-1 italic text-zinc-400">v5.2</span></h1>
            </div>
            <div class="flex gap-2">
                <input type="file" id="imageLoader" class="hidden" accept="image/*">
                <button onclick="document.getElementById('imageLoader').click()" class="px-3 py-2 bg-zinc-800 hover:bg-zinc-700 rounded text-xs transition font-medium text-white border border-zinc-700">Bild laden</button>
                <button onclick="resetApp()" class="px-3 py-2 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded text-xs transition font-medium text-orange-400">System-Reset</button>
                <button onclick="exportToExcel()" class="px-3 py-2 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded text-xs transition font-medium text-green-500">Excel Export</button>
                <button onclick="exportResult()" class="px-4 py-2 bg-red-600 hover:bg-red-500 rounded text-xs font-bold transition text-white shadow-lg">JPG Bildausgabe</button>
            </div>
        </header>

        <main class="flex-1 flex overflow-hidden min-h-0">
            <!-- Zweispaltiges Bedienfeld -->
            <aside class="w-[580px] border-r border-zinc-800 bg-zinc-950 flex flex-col h-full shrink-0 overflow-hidden">
                
                <div class="flex-1 overflow-y-auto p-4 panel-scroll min-h-0">
                    <div class="grid grid-cols-2 gap-6">
                        
                        <!-- Linke Spalte: Konfiguration -->
                        <div class="space-y-6">
                            <section class="space-y-3">
                                <label class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold">1. Vorbereitung</label>
                                <div class="space-y-2">
                                    <button onclick="toggleCropMode()" class="w-full py-2 bg-zinc-800 hover:bg-zinc-700 rounded text-xs transition border border-zinc-700 flex justify-between px-3 items-center text-white">
                                        <span>Bildausschnitt</span>
                                        <span id="cropStatus" class="text-zinc-500 font-mono italic text-[10px]">Inaktiv</span>
                                    </button>
                                    <button onclick="resetCrop()" class="w-full py-1 bg-zinc-900 hover:bg-zinc-800 rounded text-[9px] transition border border-zinc-800 text-zinc-400 uppercase">
                                        Ausschnitt Reset
                                    </button>
                                </div>
                            </section>

                            <section class="space-y-3">
                                <label class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold">2. Metrologie</label>
                                <div class="space-y-2">
                                    <button onclick="startCalibration()" class="w-full py-2 px-3 bg-zinc-800 border border-zinc-700 rounded text-xs text-left flex justify-between items-center hover:bg-zinc-700 transition text-white">
                                        <span>Kalibrierung</span>
                                        <span id="calPointCounter" class="text-red-500 font-mono font-bold text-[10px]">0/2</span>
                                    </button>
                                    <div class="p-2 bg-zinc-900 rounded border border-zinc-800 text-[10px] font-mono text-green-500 flex justify-between">
                                        <span>Maßstab:</span>
                                        <span id="statScaleVal">-</span>
                                    </div>
                                </div>
                            </section>

                            <section class="space-y-3">
                                <label class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold">3. Einstellwerte</label>
                                <div class="space-y-4">
                                    <div>
                                        <label class="block text-[10px] text-zinc-500 mb-1 uppercase text-white">Entfernung (m)</label>
                                        <input type="number" id="distance" value="100" onchange="updateStats()" class="w-full bg-zinc-900 border border-zinc-700 rounded p-1.5 text-xs font-mono text-white focus:border-red-500 outline-none">
                                    </div>
                                    <div>
                                        <label class="block text-[10px] text-zinc-500 mb-1 uppercase text-white">Vergrößerung</label>
                                        <input type="range" id="viewScale" min="1" max="5" step="0.1" value="1" oninput="updateView()" class="w-full accent-red-500 cursor-pointer h-4">
                                    </div>
                                    <div>
                                        <label class="block text-[10px] text-zinc-500 mb-1 uppercase text-white">Skalierung Protokoll</label>
                                        <input type="range" id="legendScale" min="0.5" max="2.0" step="0.1" value="1.0" class="w-full accent-red-500 cursor-pointer h-4">
                                    </div>
                                </div>
                            </section>
                        </div>

                        <!-- Rechte Spalte: Datenerfassung -->
                        <div class="space-y-6">
                            <section class="space-y-3">
                                <label class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold">4. Referenzierung</label>
                                <div class="space-y-2">
                                    <button onclick="activatePoaSetting()" class="w-full py-2 px-3 bg-red-900/10 border border-red-500/30 rounded text-xs text-left flex justify-between items-center hover:bg-red-900/20 transition text-red-100">
                                        <span>POA setzen</span>
                                        <span id="poaStatus" class="text-red-500 font-bold uppercase text-[9px]">Bereit</span>
                                    </button>
                                    <button onclick="togglePoaLock()" class="w-full py-2 px-3 bg-zinc-800 border border-zinc-700 rounded text-xs text-left flex justify-between items-center hover:bg-zinc-700 transition text-white">
                                        <span>Fixieren</span>
                                        <span id="poaLockStatus" class="text-zinc-500 uppercase font-bold text-[9px]">Aus</span>
                                    </button>
                                </div>
                            </section>

                            <section class="space-y-3">
                                <label class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold">5. Aufnahme</label>
                                <div class="space-y-2">
                                    <div>
                                        <label class="block text-[10px] text-zinc-500 mb-1 uppercase text-white">Kaliber (mm)</label>
                                        <input type="number" id="bulletDiameter" value="5.56" step="0.01" onchange="updateStats()" class="w-full bg-zinc-900 border border-zinc-700 rounded p-1.5 text-xs font-mono text-red-500 focus:border-red-500 outline-none">
                                    </div>
                                    <button id="confirmBtn" onclick="confirmLastShot()" class="w-full py-4 bg-red-600 hover:bg-red-500 rounded text-xs font-bold transition text-white shadow-md disabled:opacity-30">
                                        TREFFER BESTÄTIGEN
                                    </button>
                                    <div class="grid grid-cols-2 gap-2">
                                        <button onclick="undoLastShot()" class="py-2 bg-zinc-800 hover:bg-zinc-700 rounded text-[10px] transition border border-zinc-700 text-white">Rückgängig</button>
                                        <button onclick="clearShots()" class="py-2 bg-zinc-800 hover:bg-zinc-700 rounded text-[10px] text-red-400 transition border border-zinc-700">Löschen</button>
                                    </div>
                                </div>
                            </section>
                        </div>
                    </div>
                </div>

                <!-- Fixierter Unterbereich -->
                <div class="p-4 bg-zinc-900 border-t border-zinc-800 shrink-0 shadow-[0_-4px_20px_rgba(0,0,0,0.6)]">
                    <div class="grid grid-cols-2 gap-4 items-center">
                        <button id="adjustmentBtn" onclick="toggleAdjustmentMode()" class="py-3 bg-zinc-100 hover:bg-white rounded text-xs font-bold transition text-zinc-950 uppercase tracking-tighter shadow-xl w-full">
                            Feinjustierung
                        </button>
                        <div class="flex justify-between items-center font-mono text-white bg-black/40 p-2 rounded border border-zinc-800">
                            <span class="text-[10px] uppercase text-zinc-500">Schussanzahl n:</span>
                            <span id="shotCounter" class="text-xl font-bold text-red-500 leading-none">0</span>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Analysebereich -->
            <div class="flex-1 relative bg-black flex items-center justify-center p-4 overflow-hidden min-w-0" id="viewport">
                <div id="canvasStack" class="relative flex items-center justify-center transition-transform duration-200 ease-out origin-center">
                    <canvas id="baseCanvas" class="absolute shadow-2xl"></canvas>
                    <canvas id="overlayCanvas" class="absolute"></canvas>
                </div>
                
                <div id="calibrationDialog" class="hidden absolute top-6 bg-zinc-950 border border-red-500 p-5 rounded-lg shadow-2xl z-50 text-white">
                    <p class="text-[10px] mb-2 font-bold uppercase tracking-widest text-center text-red-500">Referenzstrecke (mm)</p>
                    <div class="flex items-center gap-2">
                        <input type="number" id="calInput" value="50" class="bg-zinc-900 border border-zinc-700 p-1.5 text-xs w-24 text-white font-mono outline-none focus:border-red-500">
                        <button onclick="confirmCalibration()" class="bg-red-600 px-4 py-1.5 rounded text-[10px] font-bold text-white uppercase transition hover:bg-red-500">Übernehmen</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const state = {
            image: null, originalImage: null, cropOffset: { x: 0, y: 0 }, poa: { x: 0, y: 0 },
            shots: [], pendingShot: null, pixelPerMm: 0.2, isPoaLocked: false, isPoaSetting: false,
            viewScale: 1, isCropMode: false, cropStart: null, cropEnd: null,
            isCalibrating: false, calPoints: [], isAdjustmentActive: false, draggedShotIndex: -1,
            mousePos: { x: 0, y: 0 },
            legend: { x: 50, y: 50, w: 550, h: 100, isDragging: false, dragOff: { x: 0, y: 0 } }
        };

        const baseCanvas = document.getElementById('baseCanvas');
        const overlayCanvas = document.getElementById('overlayCanvas');
        const bCtx = baseCanvas.getContext('2d');
        const oCtx = overlayCanvas.getContext('2d');

        window.onload = () => {
            const loader = document.getElementById('imageLoader');
            if (loader) loader.addEventListener('change', handleImage);
            overlayCanvas.addEventListener('mousedown', onMouseDown);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mouseup', onMouseUp);
            updateStats();
            requestAnimationFrame(drawLoop);
        };

        function handleImage(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => { state.originalImage = img; state.image = img; state.cropOffset = { x: 0, y: 0 }; initializeView(img); };
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        }

        function resetApp() {
            if(!confirm("Gesamtes Projekt unwiderruflich löschen?")) return;
            state.image = null; state.originalImage = null; state.shots = [];
            state.pendingShot = null; state.pixelPerMm = 0.2; state.isAdjustmentActive = false;
            state.cropOffset = { x: 0, y: 0 }; state.calPoints = [];
            updateAdjustmentUI(); updateStats();
            bCtx.clearRect(0,0,baseCanvas.width, baseCanvas.height);
            oCtx.clearRect(0,0,overlayCanvas.width, overlayCanvas.height);
        }

        function initializeView(img) {
            const viewport = document.getElementById('viewport');
            const ratio = Math.min((viewport.clientWidth - 40) / img.width, (viewport.clientHeight - 40) / img.height, 1);
            const dpr = window.devicePixelRatio || 1;
            
            [baseCanvas, overlayCanvas].forEach(c => {
                c.width = img.width * dpr;
                c.height = img.height * dpr;
                c.style.width = (img.width * ratio) + 'px';
                c.style.height = (img.height * ratio) + 'px';
            });
            
            bCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
            oCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

            const stack = document.getElementById('canvasStack');
            stack.style.width = (img.width * ratio) + 'px';
            stack.style.height = (img.height * ratio) + 'px';
            
            state.poa = { x: img.width / 2, y: img.height / 2 };
            state.legend.x = img.width - (state.legend.w + 20);
            state.legend.y = 20;
            
            document.getElementById('viewScale').value = 1;
            state.viewScale = 1;
            updateView();
        }

        function updateView() {
            state.viewScale = parseFloat(document.getElementById('viewScale').value);
            document.getElementById('canvasStack').style.transform = `scale(${state.viewScale})`;
        }

        function toggleAdjustmentMode() { state.isAdjustmentActive = !state.isAdjustmentActive; updateAdjustmentUI(); }

        function updateAdjustmentUI() {
            const btn = document.getElementById('adjustmentBtn');
            const confirmBtn = document.getElementById('confirmBtn');
            if (state.isAdjustmentActive) {
                btn.innerText = "MODUS AKTIV";
                btn.className = "py-3 bg-orange-600 hover:bg-orange-500 rounded text-xs font-bold transition text-white shadow-xl w-full";
                confirmBtn.disabled = true;
                state.pendingShot = null;
            } else {
                btn.innerText = "FEINJUSTIERUNG";
                btn.className = "py-3 bg-zinc-100 hover:bg-white rounded text-xs font-bold transition text-zinc-950 uppercase tracking-tighter shadow-xl w-full";
                confirmBtn.disabled = false;
            }
        }

        function toggleCropMode() {
            state.isCropMode = !state.isCropMode;
            const cropStatus = document.getElementById('cropStatus');
            if (cropStatus) {
                cropStatus.innerText = state.isCropMode ? "Aktiv" : "Inaktiv";
                cropStatus.className = state.isCropMode ? "text-red-500 font-bold italic text-[10px]" : "text-zinc-500 font-mono italic text-[10px]";
            }
            if (!state.isCropMode && state.cropStart && state.cropEnd) applyCrop();
        }

        function applyCrop() {
            const x = Math.min(state.cropStart.x, state.cropEnd.x), y = Math.min(state.cropStart.y, state.cropEnd.y);
            const w = Math.abs(state.cropStart.x - state.cropEnd.x), h = Math.abs(state.cropStart.y - state.cropEnd.y);
            if (w < 10 || h < 10) return;
            const temp = document.createElement('canvas'); temp.width = w; temp.height = h;
            temp.getContext('2d').drawImage(state.image, x, y, w, h, 0, 0, w, h);
            const newImg = new Image();
            newImg.onload = () => {
                state.image = newImg; state.cropOffset.x += x; state.cropOffset.y += y;
                state.shots = state.shots.map(s => ({ ...s, x: s.x - x, y: s.y - y }));
                state.poa = { x: state.poa.x - x, y: state.poa.y - y };
                initializeView(newImg);
            };
            newImg.src = temp.toDataURL();
            state.cropStart = state.cropEnd = null;
        }

        function resetCrop() {
            if (!state.originalImage || state.image === state.originalImage) return;
            const ox = state.cropOffset.x, oy = state.cropOffset.y;
            state.image = state.originalImage;
            state.shots = state.shots.map(s => ({ ...s, x: s.x + ox, y: s.y + oy }));
            state.poa = { x: state.poa.x + ox, y: state.poa.y + oy };
            state.cropOffset = { x: 0, y: 0 };
            initializeView(state.image);
            updateStats();
        }

        function onMouseDown(e) {
            if (!state.image) return;
            const pos = getMousePos(e);
            const lScale = parseFloat(document.getElementById('legendScale').value);
            if (pos.x >= state.legend.x && pos.x <= state.legend.x + state.legend.w * lScale &&
                pos.y >= state.legend.y && pos.y <= state.legend.y + state.legend.h * lScale) {
                state.legend.isDragging = true; state.legend.dragOff.x = pos.x - state.legend.x;
                state.legend.dragOff.y = pos.y - state.legend.y; return;
            }
            if (state.isPoaSetting) { state.poa = pos; state.isPoaSetting = false; document.getElementById('poaStatus').innerText = "Bereit"; updateStats(); return; }
            if (state.isCropMode) { state.cropStart = pos; return; }
            if (state.isCalibrating) {
                state.calPoints.push(pos); document.getElementById('calPointCounter').innerText = state.calPoints.length + "/2";
                if (state.calPoints.length === 2) { document.getElementById('calibrationDialog').classList.remove('hidden'); state.isCalibrating = false; }
                return;
            }
            if (state.isAdjustmentActive) {
                const threshold = 20 / state.viewScale;
                state.draggedShotIndex = state.shots.findIndex(s => Math.hypot(s.x - pos.x, s.y - pos.y) < threshold);
                return;
            }
            if (e.shiftKey && !state.isPoaLocked) { state.poa = pos; updateStats(); return; }
            state.pendingShot = { x: pos.x, y: pos.y };
        }

        function onMouseMove(e) {
            if (!state.image) return;
            const pos = getMousePos(e);
            state.mousePos = pos;
            if (state.isCropMode && state.cropStart) state.cropEnd = pos;
            if (state.legend.isDragging) { state.legend.x = pos.x - state.legend.dragOff.x; state.legend.y = pos.y - state.legend.dragOff.y; }
            if (state.draggedShotIndex !== -1) { state.shots[state.draggedShotIndex].x = pos.x; state.shots[state.draggedShotIndex].y = pos.y; updateStats(); }
        }

        function onMouseUp() { state.legend.isDragging = false; state.draggedShotIndex = -1; if (state.isCropMode) toggleCropMode(); }

        function getMousePos(e) {
            if (!state.image) return { x: 0, y: 0 };
            const rect = overlayCanvas.getBoundingClientRect();
            return { 
                x: (e.clientX - rect.left) * (state.image.width / rect.width), 
                y: (e.clientY - rect.top) * (state.image.height / rect.height) 
            };
        }

        function activatePoaSetting() { if (state.isPoaLocked) return; state.isPoaSetting = true; document.getElementById('poaStatus').innerText = "Wählen..."; }

        function togglePoaLock() {
            state.isPoaLocked = !state.isPoaLocked; const l = document.getElementById('poaLockStatus');
            l.innerText = state.isPoaLocked ? "Fixiert" : "Aus";
            l.className = state.isPoaLocked ? "text-green-500 uppercase font-bold text-[9px]" : "text-zinc-500 uppercase font-bold text-[9px]";
        }

        function confirmLastShot() { if (state.pendingShot && !state.isAdjustmentActive) { state.shots.push({ ...state.pendingShot }); state.pendingShot = null; updateStats(); } }
        function undoLastShot() { state.shots.pop(); updateStats(); }
        function clearShots() { state.shots = []; state.pendingShot = null; updateStats(); }

        function startCalibration() { state.isCalibrating = true; state.calPoints = []; document.getElementById('calPointCounter').innerText = "0/2"; }

        function confirmCalibration() {
            const realDist = parseFloat(document.getElementById('calInput').value) || 50;
            const pxDist = Math.hypot(state.calPoints[0].x - state.calPoints[1].x, state.calPoints[0].y - state.calPoints[1].y);
            state.pixelPerMm = realDist / pxDist;
            document.getElementById('calibrationDialog').classList.add('hidden'); document.getElementById('calPointCounter').innerText = "OK";
            state.calPoints = []; updateStats();
        }

        function toMoa(mm, distM) { if (distM <= 0) return 0; return Math.atan(mm / (distM * 1000)) * (180 * 60 / Math.PI); }

        function calculateBallistics() {
            const n = state.shots.length; if (n < 1) return null;
            let sumX = 0, sumY = 0; state.shots.forEach(s => { sumX += s.x; sumY += s.y; });
            const coi = { x: sumX / n, y: sumY / n };
            const distM = parseFloat(document.getElementById('distance').value) || 100;
            let maxDPx = 0;
            for(let i=0; i<n; i++) {
                for(let j=i+1; j<n; j++) {
                    const d = Math.hypot(state.shots[i].x - state.shots[j].x, state.shots[i].y - state.shots[j].y);
                    if (d > maxDPx) maxDPx = d;
                }
            }
            const esMm = maxDPx * state.pixelPerMm;
            let sumRadiusPx = 0; state.shots.forEach(s => { sumRadiusPx += Math.hypot(s.x - coi.x, s.y - coi.y); });
            const mrMm = (sumRadiusPx / n) * state.pixelPerMm;
            let sigma = 0;
            if (n >= 2) {
                let sqDiffX = 0, sqDiffY = 0;
                state.shots.forEach(s => { sqDiffX += Math.pow(s.x - coi.x, 2); sqDiffY += Math.pow(s.y - coi.y, 2); });
                sigma = Math.sqrt(( (sqDiffX / (n - 1)) + (sqDiffY / (n - 1)) ) / 2);
            }
            const r50Mm = 1.1774 * sigma * state.pixelPerMm;
            const r95Mm = 2.4477 * sigma * state.pixelPerMm;
            const dMmX = (coi.x - state.poa.x) * state.pixelPerMm;
            const dMmY = (state.poa.y - coi.y) * state.pixelPerMm;
            return { coi, es: { mm: esMm, moa: toMoa(esMm, distM) }, mr: { mm: mrMm, moa: toMoa(mrMm, distM) }, r50: { mm: r50Mm, moa: toMoa(r50Mm, distM) }, r95: { mm: r95Mm, moa: toMoa(r95Mm, distM) }, offset: { x: dMmX, y: dMmY, total: Math.hypot(dMmX, dMmY) } };
        }

        function updateStats() {
            const res = calculateBallistics();
            document.getElementById('shotCounter').innerText = state.shots.length;
            document.getElementById('statScaleVal').innerText = `${state.pixelPerMm.toFixed(4)} mm/px`;
        }

        function drawLoop() {
            oCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
            if (!state.image) { requestAnimationFrame(drawLoop); return; }
            
            bCtx.clearRect(0, 0, baseCanvas.width, baseCanvas.height); 
            bCtx.drawImage(state.image, 0, 0);
            
            const rPx = ((parseFloat(document.getElementById('bulletDiameter').value) || 5.56) / state.pixelPerMm) / 2;
            
            // Fadenkreuz bei aktiver Interaktion
            if (!state.legend.isDragging && state.draggedShotIndex === -1) {
                oCtx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
                oCtx.lineWidth = 0.5;
                oCtx.beginPath();
                oCtx.moveTo(state.mousePos.x, 0); oCtx.lineTo(state.mousePos.x, state.image.height);
                oCtx.moveTo(0, state.mousePos.y); oCtx.lineTo(state.image.width, state.mousePos.y);
                oCtx.stroke();
            }

            if (state.calPoints.length > 0) {
                oCtx.strokeStyle = '#22c55e'; oCtx.lineWidth = 2;
                state.calPoints.forEach(p => { oCtx.beginPath(); oCtx.moveTo(p.x-10, p.y); oCtx.lineTo(p.x+10, p.y); oCtx.moveTo(p.x, p.y-10); oCtx.lineTo(p.x, p.y+10); oCtx.stroke(); });
            }
            
            oCtx.strokeStyle = '#ef4444'; oCtx.lineWidth = 3; oCtx.beginPath();
            oCtx.moveTo(state.poa.x-40, state.poa.y); oCtx.lineTo(state.poa.x+40, state.poa.y); oCtx.moveTo(state.poa.x, state.poa.y-40); oCtx.lineTo(state.poa.x, state.poa.y+40); oCtx.stroke();
            
            state.shots.forEach((shot, index) => {
                const isDragged = (state.draggedShotIndex === index);
                oCtx.fillStyle = isDragged ? 'rgba(255, 165, 0, 0.85)' : 'rgba(173, 216, 230, 0.7)';
                oCtx.beginPath(); oCtx.arc(shot.x, shot.y, rPx, 0, Math.PI * 2); oCtx.fill();
                oCtx.strokeStyle = isDragged ? 'white' : 'rgba(173, 216, 230, 0.95)'; oCtx.lineWidth = isDragged ? 3 : 1.5; oCtx.stroke();
            });
            
            if (state.pendingShot && !state.isAdjustmentActive) { 
                oCtx.fillStyle = 'rgba(239, 68, 68, 0.35)'; 
                oCtx.beginPath(); oCtx.arc(state.pendingShot.x, state.pendingShot.y, rPx, 0, Math.PI * 2); oCtx.fill(); 
                oCtx.strokeStyle = '#ef4444'; oCtx.lineWidth = 2; oCtx.stroke(); 
            }
            
            const stats = calculateBallistics();
            if (stats) {
                if (state.shots.length >= 2) {
                    oCtx.lineWidth = 4; oCtx.setLineDash([6, 3]);
                    oCtx.strokeStyle = '#22c55e'; oCtx.beginPath(); oCtx.arc(stats.coi.x, stats.coi.y, stats.r50.mm / state.pixelPerMm, 0, Math.PI * 2); oCtx.stroke();
                    oCtx.strokeStyle = '#eab308'; oCtx.beginPath(); oCtx.arc(stats.coi.x, stats.coi.y, stats.r95.mm / state.pixelPerMm, 0, Math.PI * 2); oCtx.stroke();
                    oCtx.setLineDash([]);
                }
                oCtx.fillStyle = '#f97316'; oCtx.beginPath(); oCtx.arc(stats.coi.x, stats.coi.y, 6, 0, Math.PI * 2); oCtx.fill();
                drawLegend(stats);
            }
            drawScaleRuler();
            
            // Maskiertes Ausschnittsfenster
            if (state.isCropMode && state.cropStart && state.cropEnd) {
                const x = Math.min(state.cropStart.x, state.cropEnd.x), y = Math.min(state.cropStart.y, state.cropEnd.y), w = Math.abs(state.cropStart.x - state.cropEnd.x), h = Math.abs(state.cropStart.y - state.cropEnd.y);
                
                oCtx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                oCtx.beginPath();
                oCtx.rect(0, 0, state.image.width, state.image.height);
                oCtx.rect(x, y, w, h);
                oCtx.fill('evenodd');

                oCtx.strokeStyle = '#ef4444'; oCtx.setLineDash([5, 5]); oCtx.lineWidth = 2;
                oCtx.strokeRect(x, y, w, h); oCtx.setLineDash([]);
            }
            requestAnimationFrame(drawLoop);
        }

        function drawScaleRuler() {
            const rulerLengthMm = 10, pxWidth = rulerLengthMm / state.pixelPerMm, x = 30, y = overlayCanvas.height/ (window.devicePixelRatio || 1) - 30;
            oCtx.strokeStyle = '#22c55e'; oCtx.lineWidth = 3; oCtx.beginPath(); oCtx.moveTo(x, y); oCtx.lineTo(x + pxWidth, y); oCtx.moveTo(x, y-6); oCtx.lineTo(x, y+6); oCtx.moveTo(x+pxWidth, y-6); oCtx.lineTo(x+pxWidth, y+6); oCtx.stroke();
            oCtx.fillStyle = '#22c55e'; oCtx.font = 'bold 12px monospace'; oCtx.fillText(`${rulerLengthMm} mm`, x, y - 12);
        }

        function drawLegend(stats) {
            const scale = parseFloat(document.getElementById('legendScale').value) || 1.0;
            const lx = state.legend.x, ly = state.legend.y, lw = (state.legend.w || 550) * scale, lineH = 22 * scale;
            let lineCount = 5.0; if (state.shots.length >= 2) lineCount += 2;
            lineCount += 3.5; const calculatedH = lineCount * lineH + (30 * scale);
            state.legend.h = calculatedH / scale;
            oCtx.fillStyle = 'rgba(12, 12, 12, 0.96)'; 
            oCtx.roundRect(lx, ly, lw, calculatedH, 6 * scale); 
            oCtx.fill();
            oCtx.strokeStyle = state.legend.isDragging ? '#ffffff' : 'rgba(255, 255, 255, 0.2)'; 
            oCtx.lineWidth = 1; oCtx.stroke();
            const fSizeBold = 13 * scale;
            const fSizeReg = 11 * scale;
            let cy = ly + (25 * scale);
            oCtx.fillStyle = 'white';
            oCtx.font = `bold ${fSizeBold}px "ui-monospace", monospace`;
            oCtx.fillText(`ANALYSEPROTOKOLL (n = ${state.shots.length})`, lx + (15 * scale), cy); cy += lineH * 0.8;
            oCtx.fillStyle = '#444'; oCtx.fillRect(lx + (15 * scale), cy, lw - (30 * scale), 1); cy += lineH * 1.0;
            const drawMetric = (label, valMm, valMoa, color = 'white') => {
                oCtx.fillStyle = 'white'; 
                oCtx.font = `${fSizeReg}px "ui-monospace", monospace`; 
                oCtx.fillText(label.padEnd(20, ' '), lx + (15 * scale), cy);
                oCtx.fillStyle = color;
                oCtx.font = `bold ${fSizeReg}px "ui-monospace", monospace`;
                oCtx.fillText(`${valMm.toFixed(2)} mm`, lx + (190 * scale), cy); 
                oCtx.fillStyle = 'white';
                oCtx.fillText(`| ${valMoa.toFixed(3)} MOA`, lx + (290 * scale), cy); cy += lineH;
            };
            drawMetric("Max. Streuung (ES):", stats.es.mm, stats.es.moa); 
            drawMetric("Mittl. Radius (MR):", stats.mr.mm, stats.mr.moa);
            if (state.shots.length >= 2) { 
                drawMetric("R50 (50 % Prob.):", stats.r50.mm, stats.r50.moa, '#22c55e'); 
                drawMetric("R95 (95 % Prob.):", stats.r95.mm, stats.r95.moa, '#eab308'); 
            }
            cy += lineH * 0.5; 
            oCtx.fillStyle = 'white'; 
            oCtx.font = `bold ${fSizeReg}px "ui-monospace", monospace`; 
            oCtx.fillText("ABWEICHUNG COI ZU POA", lx + (15 * scale), cy); cy += lineH;
            oCtx.font = `${fSizeReg}px "ui-monospace", monospace`; 
            oCtx.fillText(`Linear: ${stats.offset.total.toFixed(2)} mm`, lx + (15 * scale), cy); 
            oCtx.fillText(`Vektor: ${stats.offset.x.toFixed(2)} S / ${stats.offset.y.toFixed(2)} H`, lx + (190 * scale), cy); 
            cy += lineH * 1.2;
            const distM = parseFloat(document.getElementById('distance').value) || 100, mradPerClick = 0.1, mmPerClick = distM * mradPerClick;
            const clX = Math.round((stats.coi.x - state.poa.x) * state.pixelPerMm / mmPerClick), clY = Math.round((state.poa.y - stats.coi.y) * state.pixelPerMm / mmPerClick);
            oCtx.fillStyle = '#10b981'; 
            oCtx.font = `bold ${fSizeBold}px "ui-monospace", monospace`;
            const labelX = Math.abs(clX) === 1 ? "Klick" : "Klicks", labelY = Math.abs(clY) === 1 ? "Klick" : "Klicks", dirX = clX > 0 ? "LINKS" : "RECHTS", dirY = clY > 0 ? "TIEF" : "HOCH";
            oCtx.fillText(`KORREKTUR ABSEHEN (0.1 MRAD):`, lx + (15 * scale), cy); cy += lineH;
            oCtx.fillStyle = 'white'; 
            oCtx.fillText(`  SEITE: ${Math.abs(clX)} ${labelX} ${dirX}`, lx + (15 * scale), cy); 
            oCtx.fillText(`  HÖHE:  ${Math.abs(clY)} ${labelY} ${dirY}`, lx + (240 * scale), cy);
        }

        function exportToExcel() {
            if (state.shots.length === 0) return; let csv = "Treffer;X-Abw [mm];Y-Abw [mm]\n";
            state.shots.forEach((s, i) => { const dx = (s.x - state.poa.x) * state.pixelPerMm, dy = (state.poa.y - s.y) * state.pixelPerMm; csv += `${i + 1};${dx.toFixed(3).replace('.', ',')};${dy.toFixed(3).replace('.', ',')}\n`; });
            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' }); const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = `ShotAnalyst_Messdaten.csv`; link.click();
        }

        function exportResult() {
            const buffer = document.createElement('canvas'); 
            buffer.width = state.image.width; buffer.height = state.image.height; 
            const ctx = buffer.getContext('2d');
            ctx.drawImage(baseCanvas, 0, 0, baseCanvas.width, baseCanvas.height, 0, 0, buffer.width, buffer.height); 
            ctx.drawImage(overlayCanvas, 0, 0, overlayCanvas.width, overlayCanvas.height, 0, 0, buffer.width, buffer.height); 
            const link = document.createElement('a'); link.download = `ShotAnalyst_Bericht.jpg`; link.href = buffer.toDataURL('image/jpeg', 0.95); link.click();
        }
    </script>
</body>
</html>
